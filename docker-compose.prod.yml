services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: library
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: ghcr.io/${GHCR_OWNER:-trak2026z}/library3-backend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/library"
    networks:
      - app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    image: ghcr.io/${GHCR_OWNER:-trak2026z}/library3-frontend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Next server-side rewrite: /api/* -> backend
      API_PROXY_TARGET: "http://backend:4000"
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:3000"
    networks:
      - app
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  app:

volumes:
  db_data: